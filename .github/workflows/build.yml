name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release build (macOS, Apple Silicon)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Dependencies (swift-jinja ≥ 2.0) require Swift tools 6.0+. The macos-15
      # image ships Xcode 16 (Swift 6.x) by default, which satisfies this; the
      # version is printed below so any image drift is visible in the logs.
      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release
        run: swift build -c release --arch arm64
