name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release build (macOS, Apple Silicon)
    # macOS 26 image: ships the FoundationModels SDK (used by the on-device
    # Enhance feature) and Xcode 26 / Swift 6.x (needed by swift-jinja ≥ 2.0).
    # The code also compiles on older SDKs via `#if canImport(FoundationModels)`,
    # but CI builds on 26 so the full feature is exercised.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release
        run: swift build -c release --arch arm64
